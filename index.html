<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor ZPL Pro - Ultra Performance</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f0f2f5; color: #1a1a1a; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        h1 { color: #1e293b; text-align: center; margin-top: 0; }
        
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 25px; background: #f8fafc; padding: 15px; border-radius: 8px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; color: #64748b; }
        select, input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        
        .upload-section { border: 2px dashed #3b82f6; padding: 25px; text-align: center; border-radius: 8px; margin-bottom: 20px; background: #eff6ff; }
        input[type="file"] { margin-top: 10px; font-size: 0.9rem; }
        
        textarea { width: 100%; height: 150px; padding: 15px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: monospace; resize: vertical; box-sizing: border-box; }
        
        button { width: 100%; padding: 18px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        
        #status { margin-top: 20px; text-align: center; padding: 15px; border-radius: 6px; font-weight: 500; min-height: 20px; white-space: pre-line; }
        .status-loading { color: #2563eb; background: #eff6ff; border: 1px solid #bfdbfe; }
        .status-success { color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; }
        .status-error { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; }
        
        .divider { text-align: center; margin: 20px 0; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ZPL to PDF Bulk Converter</h1>
    
    <div class="config-grid">
        <div>
            <label>Densidade</label>
            <select id="dpmm">
                <option value="6">6 dpmm (150 dpi)</option>
                <option value="8" selected>8 dpmm (203 dpi)</option>
                <option value="12">12 dpmm (300 dpi)</option>
                <option value="24">24 dpmm (600 dpi)</option>
            </select>
        </div>
        <div>
            <label>Largura (Pol.)</label>
            <input type="number" id="width" value="4" step="0.1">
        </div>
        <div>
            <label>Altura (Pol.)</label>
            <input type="number" id="height" value="6" step="0.1">
        </div>
    </div>

    <div class="upload-section">
        <label>📁 Carregue um arquivo pesado (.zpl ou .txt)</label>
        <input type="file" id="fileInput" accept=".zpl,.txt">
    </div>

    <div class="divider">ou cole o código abaixo</div>

    <textarea id="zplInput" placeholder="Comece com ^XA..."></textarea>

    <button id="convertBtn">PROCESSAR E BAIXAR PDF(S)</button>
    
    <div id="status"></div>
</div>

<script>
    const btn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');
    const zplInput = document.getElementById('zplInput');

    function updateStatus(text, type) {
        status.innerText = text;
        status.className = '';
        if(type) status.classList.add(`status-${type}`);
    }

    async function processZPL() {
        let zplText = "";
        
        // 1. Pega o conteúdo (Arquivo ou Textarea)
        if (fileInput.files.length > 0) {
            zplText = await fileInput.files[0].text();
        } else {
            zplText = zplInput.value;
        }

        if (!zplText.trim()) {
            updateStatus("⚠️ Nada para processar! Selecione um arquivo ou cole o código.", "error");
            return;
        }

        // 2. Divide em etiquetas individuais baseadas no comando ^XZ
        // Usamos regex global /i para não diferenciar maiúsculas de minúsculas
        const labels = zplText.split(/\^XZ/i).filter(l => l.trim().includes('^XA')).map(l => l + "^XZ");
        
        if (labels.length === 0) {
            updateStatus("❌ Código ZPL inválido. Certifique-se de usar ^XA e ^XZ.", "error");
            return;
        }

        const batchSize = 40; // Número de etiquetas por PDF (Lote seguro para API)
        const totalBatches = Math.ceil(labels.length / batchSize);
        const dpmm = document.getElementById('dpmm').value;
        const width = document.getElementById('width').value;
        const height = document.getElementById('height').value;

        btn.disabled = true;
        updateStatus(`🚀 Iniciando: ${labels.length} etiquetas detectadas.\nProcessando em ${totalBatches} lote(s)...`, "loading");

        try {
            for (let i = 0; i < totalBatches; i++) {
                const start = i * batchSize;
                const end = start + batchSize;
                const currentBatchZPL = labels.slice(start, end).join("\n");

                updateStatus(`⏳ Gerando lote ${i + 1} de ${totalBatches}...`, "loading");

                const response = await fetch(`https://api.labelary.com/v1/printers/${dpmm}dpmm/labels/${width}x${height}/0/`, {
                    method: 'POST',
                    headers: { 
                        'Accept': 'application/pdf',
                        'Content-Type': 'text/plain' 
                    },
                    body: currentBatchZPL
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    
                    // Cria o download silencioso
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = totalBatches > 1 ? `etiquetas_parte_${i + 1}.pdf` : `etiquetas.pdf`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url); // Limpa memória
                } else {
                    const errorMsg = await response.text();
                    throw new Error(`Erro no Lote ${i+1}: ${errorMsg}`);
                }
            }
            updateStatus(`✅ Sucesso! ${labels.length} etiquetas processadas.\nOs arquivos foram baixados automaticamente.`, "success");
        } catch (err) {
            updateStatus("❌ Erro: " + err.message, "error");
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    }

    btn.addEventListener('click', processZPL);
</script>

</body>
</html>
