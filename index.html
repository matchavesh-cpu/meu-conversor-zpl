<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ SHOPEE CONVERTER - FUNCIONA!</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 700px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; font-size: 2.2rem; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-size: 1.1rem; }
        .config { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border-radius: 12px; border: 2px solid #e9ecef; }
        .field label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 8px; color: #495057; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .upload-area { border: 3px dashed #667eea; padding: 40px; text-align: center; border-radius: 12px; margin-bottom: 25px; cursor: pointer; background: linear-gradient(135deg, #f0f2ff 0%, #e8e8ff 100%); transition: all 0.3s; }
        .upload-area:hover { border-color: #764ba2; transform: translateY(-2px); }
        button { width: 100%; padding: 18px; background: linear-gradient(45deg, #27ae60, #2ecc71); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 18px; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        #status { margin-top: 25px; padding: 20px; border-radius: 12px; font-size: 16px; text-align: center; min-height: 24px; line-height: 1.6; font-weight: 500; }
        .loading { background: #e3f2fd; color: #1976d2; border: 2px solid #2196f3; animation: pulse 1.5s infinite; }
        .success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
        .file-info { background: #e8f5e8; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 14px; color: #155724; }
        #preview { background: #f8f9fa; padding: 15px; border-radius: 8px; font-size: 12px; max-height: 150px; overflow-y: auto; margin-top: 15px; white-space: pre-wrap; display: none; font-family: monospace; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 SHOPEE / ML CONVERTER</h1>
    <p class="subtitle">✅ Formato ~DGR da Shopee - 100% Funcional</p>
    
    <div class="config">
        <div class="field">
            <label>📐 DPI</label>
            <select id="dpmm">
                <option value="8" selected>203 dpi</option>
                <option value="12">300 dpi</option>
            </select>
        </div>
        <div class="field">
            <label>📏 Largura</label>
            <input type="number" id="width" value="4" min="2" max="8" step="0.1">
        </div>
        <div class="field">
            <label>📐 Altura</label>
            <input type="number" id="height" value="6" min="2" max="12" step="0.1">
        </div>
    </div>

    <div class="upload-area" id="uploadArea">
        <strong>📁 ARRASTE seu arquivo Shopee/ML</strong><br>
        <small>✅ .zpl .txt .lab - ~DGR:^XA^XZ</small>
        <input type="file" id="fileInput" accept=".zpl,.txt,.lab" style="display:none">
        <div id="fileName" class="file-info" style="display: none;"></div>
        <div id="preview"></div>
    </div>

    <button id="convertBtn">🚀 CONVERTER E BAIXAR PDF</button>
    <div id="status"></div>
</div>

<script>
    const dpmm = document.getElementById('dpmm');
    const width = document.getElementById('width');
    const height = document.getElementById('height');
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const fileName = document.getElementById('fileName');
    const preview = document.getElementById('preview');
    const btn = document.getElementById('convertBtn');
    const status = document.getElementById('status');

    // Drag & Drop
    uploadArea.addEventListener('dragover', e => e.preventDefault());
    uploadArea.addEventListener('drop', e => {
        e.preventDefault();
        if (e.dataTransfer.files[0]) {
            fileInput.files = e.dataTransfer.files;
            loadFile(e.dataTransfer.files[0]);
        }
    });
    uploadArea.addEventListener('click', () => fileInput.click());
    
    fileInput.onchange = e => {
        if (e.target.files[0]) loadFile(e.target.files[0]);
    };

    async function loadFile(file) {
        fileName.innerHTML = `📄 <strong>${file.name}</strong><br>📊 ${Math.round(file.size/1024)} KB`;
        fileName.style.display = 'block';
        btn.disabled = false;

        const content = await file.text();
        const labels = extractShopeeLabels(content);
        
        preview.innerHTML = `✅ <strong>${labels.length} etiquetas</strong> encontradas!<br><br>
${labels[0]?.substring(0, 400) || 'N/A'}...`;
        preview.style.display = 'block';
    }

    function updateStatus(text, type = '') {
        status.textContent = text;
        status.className = type;
    }

    // 🔥 EXTRAÇÃO PERFEITA SHOPEE
    function extractShopeeLabels(content) {
        // Limpa BOM e normaliza
        content = content.replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n');
        
        const labels = [];
        
        // Pega ~DGR:...^XA^XZ da Shopee
        let match;
        const regex = /~DGR:.*?(\^XA[\s\S]*?\^XZ)/gi;
        while ((match = regex.exec(content)) !== null) {
            // 🔥 LIMPA PERFEITAMENTE - só ^XA^XZ
            const cleanLabel = match[1]
                .replace(/^\^XA\s*/, '^XA\n')  // Adiciona quebra após ^XA
                .replace(/\s*\^XZ$/, '\n^XZ')  // Adiciona quebra antes ^XZ
                .trim();
            labels.push(cleanLabel);
        }
        
        // Fallback ZPL padrão
        if (labels.length === 0) {
            const fallbackRegex = /(\^XA[\s\S]*?\^XZ)/gi;
            while ((match = fallbackRegex.exec(content)) !== null) {
                labels.push(match[1].trim());
            }
        }
        
        return labels.filter(l => l.includes('^XA') && l.includes('^XZ') && l.length > 50);
    }

    // 🔥 CONFIGURAÇÃO OFICIAL LABELARY
    async function convertLabel(zpl) {
        const response = await fetch(
            `https://api.labelary.com/v1/printers/${dpmm.value}dpmm/labels/${width.value}x${height.value}/0/`, 
            {
                method: 'POST',
                headers: {
                    'Accept': 'application/pdf'
                    // 🔥 SEM Content-Type = Labelary detecta automaticamente
                    // 'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: zpl  // 🔥 ZPL PURO sem encoding
            }
        );

        if (!response.ok) {
            const error = await response.text();
            throw new Error(error);
        }
        
        return await response.blob();
    }

    async function startConversion() {
        if (!fileInput.files[0]) {
            updateStatus('❌ Selecione um arquivo!', 'error');
            return;
        }

        btn.disabled = true;
        updateStatus('⏳ Carregando etiquetas...', 'loading');

        try {
            const content = await fileInput.files[0].text();
            const labels = extractShopeeLabels(content);
            
            if (labels.length === 0) {
                throw new Error('❌ Nenhuma etiqueta ^XA^XZ encontrada!');
            }

            updateStatus(`🚀 Convertendo ${labels.length} etiquetas...`, 'loading');
            
            // Converte TODAS de uma vez (Labelary aceita!)
            const zplAll = labels.join('\n');
            
            const blob = await convertLabel(zplAll);
            
            // Download
            const timestamp = new Date().toISOString().slice(0,19).replace(/:/g,'-');
            const filename = `shopee_${timestamp}.pdf`;
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            updateStatus(`✅ ${labels.length} etiquetas convertidas! PDF baixado.`, 'success');

        } catch (error) {
            updateStatus(`❌ ${error.message}`, 'error');
            console.error(error);
        } finally {
            btn.disabled = false;
        }
    }

    btn.addEventListener('click', startConversion);
</script>

</body>
</html>
