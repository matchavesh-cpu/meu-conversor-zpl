<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Shopee & ML - Ultra Performance</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f0f2f5; color: #1a1a1a; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        h1 { color: #1e293b; text-align: center; margin-top: 0; }
        p { text-align: center; color: #64748b; margin-bottom: 25px; }
        
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 25px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; color: #64748b; }
        select, input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        
        .upload-section { border: 2px dashed #2563eb; padding: 30px; text-align: center; border-radius: 8px; margin-bottom: 20px; background: #f0f7ff; transition: 0.3s; }
        .upload-section:hover { background: #e0eeff; }
        input[type="file"] { margin-top: 10px; cursor: pointer; }
        
        button { width: 100%; padding: 20px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        button:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; transform: none; }
        
        #status { margin-top: 20px; text-align: center; padding: 15px; border-radius: 6px; font-weight: 500; min-height: 40px; white-space: pre-line; line-height: 1.5; }
        .status-loading { color: #2563eb; background: #eff6ff; border: 1px solid #bfdbfe; }
        .status-success { color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; }
        .status-error { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; }
        
        .footer-info { margin-top: 20px; font-size: 0.8rem; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Conversor de Etiquetas ZPL</h1>
    <p>Otimizado para Shopee, Mercado Livre e Envios Extra</p>
    
    <div class="config-grid">
        <div>
            <label>Densidade (DPI)</label>
            <select id="dpmm">
                <option value="8" selected>203 DPI (Padrão)</option>
                <option value="12">300 DPI (Alta)</option>
            </select>
        </div>
        <div>
            <label>Largura (Pol.)</label>
            <input type="number" id="width" value="4">
        </div>
        <div>
            <label>Altura (Pol.)</label>
            <input type="number" id="height" value="6">
        </div>
    </div>

    <div class="upload-section">
        <label><strong>1. Selecione o arquivo da Shopee/ML (.txt ou .zpl)</strong></label><br>
        <input type="file" id="fileInput" accept=".zpl,.txt">
    </div>

    <button id="convertBtn">CONVERTER AGORA</button>
    
    <div id="status"></div>
    <div class="footer-info">Processamento local seguro. Seus dados não são armazenados.</div>
</div>

<script>
    const btn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');

    function updateStatus(text, type) {
        status.innerText = text;
        status.className = '';
        if(type) status.classList.add(`status-${type}`);
    }

    // Função para extrair apenas o ZPL válido de arquivos "sujos"
    function cleanZPL(rawText) {
        // Encontra tudo que está entre ^XA e ^XZ (ignorando maiúsculas/minúsculas)
        const regex = /\^XA[\s\S]*?\^XZ/gi;
        const matches = rawText.match(regex);
        return matches || [];
    }

    async function processZPL() {
        if (fileInput.files.length === 0) {
            updateStatus("⚠️ Por favor, selecione um arquivo primeiro!", "error");
            return;
        }

        updateStatus("🔍 Lendo arquivo e limpando dados...", "loading");
        btn.disabled = true;

        try {
            const rawText = await fileInput.files[0].text();
            const labels = cleanZPL(rawText);

            if (labels.length === 0) {
                throw new Error("Não encontramos comandos ZPL válidos (^XA...^XZ) neste arquivo.");
            }

            // Configurações
            const dpmm = document.getElementById('dpmm').value;
            const width = document.getElementById('width').value;
            const height = document.getElementById('height').value;
            
            // Lotes menores (20 etiquetas) aumentam a chance de sucesso em arquivos da Shopee
            const batchSize = 20; 
            const totalBatches = Math.ceil(labels.length / batchSize);

            updateStatus(`🚀 Detectadas ${labels.length} etiquetas.\nGerando ${totalBatches} arquivo(s) PDF...`, "loading");

            for (let i = 0; i < totalBatches; i++) {
                const start = i * batchSize;
                const end = start + batchSize;
                const batchZPL = labels.slice(start, end).join("\n");

                updateStatus(`⏳ Processando Lote ${i + 1} de ${totalBatches}...`, "loading");

                const response = await fetch(`https://api.labelary.com/v1/printers/${dpmm}dpmm/labels/${width}x${height}/0/`, {
                    method: 'POST',
                    headers: { 'Accept': 'application/pdf' },
                    body: batchZPL
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(`Erro na API: ${errorMsg}`);
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = `Etiquetas_Parte_${i + 1}.pdf`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // Pequena pausa para o navegador não travar e a API não bloquear
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            updateStatus(`✅ Concluído com sucesso!\n${labels.length} etiquetas baixadas em ${totalBatches} partes.`, "success");

        } catch (err) {
            updateStatus(`❌ Falha: ${err.message}\nVerifique se o arquivo é realmente ZPL.`, "error");
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    }

    btn.addEventListener('click', processZPL);
</script>

</body>
</html>
