<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ZPL Converter</title>
</head>
<body>

<h2>Conversor ZPL (sem limites 😈)</h2>

<textarea id="zpl" rows="15" cols="80">
^XA
^FO50,50^A0N,50,50^FDTeste ZPL^FS
^XZ
</textarea>

<br><br>

<button onclick="enviar()">Renderizar</button>

<br><br>

<img id="img" style="border:1px solid #000; max-width:400px"/>

<script>
async function enviar() {
  const zpl = document.getElementById("zpl").value;

  const res = await fetch("/render", {
    method: "POST",
    body: zpl
  });

  const blob = await res.blob();
  document.getElementById("img").src = URL.createObjectURL(blob);
}
</script>

</body>
</html>
