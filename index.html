<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Conversor Shopee/ML - FUNCIONA!</title>
    <style>
        /* Mesmo CSS da versão anterior - mantive igual */
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }
        .container { 
            width: 100%; 
            max-width: 700px; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        }
        h1 { 
            color: #2c3e50; 
            text-align: center; 
            font-size: 2rem; 
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .config { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 25px; 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 12px; 
            border: 2px solid #e9ecef;
        }
        .field label { 
            font-size: 13px; 
            font-weight: 600; 
            display: block; 
            margin-bottom: 8px; 
            color: #495057; 
        }
        select, input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e9ecef; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        .upload-area { 
            border: 3px dashed #667eea; 
            padding: 40px; 
            text-align: center; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            cursor: pointer; 
            background: linear-gradient(135deg, #f0f2ff 0%, #e8e8ff 100%); 
            transition: all 0.3s;
        }
        button { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(45deg, #27ae60, #2ecc71); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 18px; 
        }
        button:disabled { 
            background: #6c757d; 
            cursor: not-allowed;
        }
        #status { 
            margin-top: 25px; 
            padding: 20px; 
            border-radius: 12px; 
            font-size: 16px; 
            text-align: center; 
            min-height: 24px; 
            line-height: 1.6; 
            font-weight: 500;
        }
        .loading { background: #e3f2fd; color: #1976d2; border: 2px solid #2196f3; }
        .success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
        .warning { background: #fff3cd; color: #856404; border: 2px solid #ffc107; }
        .progress { background: #fff3cd; color: #856404; border: 2px solid #ffc107; }
        #progressBar { width: 100%; height: 20px; background: #e9ecef; border-radius: 10px; overflow: hidden; margin-top: 10px; display: none; }
        #progressFill { height: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); transition: width 0.3s; }
        .file-info { background: #e8f5e8; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 Conversor Shopee/ML</h1>
    <p class="subtitle">Converte QUALQUER tamanho de ZPL!</p>
    
    <div class="config">
        <div class="field">
            <label>DPI</label>
            <select id="dpmm">
                <option value="8" selected>203 dpi</option>
                <option value="12">300 dpi</option>
            </select>
        </div>
        <div class="field">
            <label>Largura</label>
            <input type="number" id="width" value="4" min="1" max="12" step="0.1">
        </div>
        <div class="field">
            <label>Altura</label>
            <input type="number" id="height" value="6" min="1" max="20" step="0.1">
        </div>
    </div>

    <div class="upload-area" id="uploadArea">
        <strong>📁 ARRASTE ou CLIQUE seu arquivo ZPL</strong><br>
        <small>Funciona com .zpl, .txt, .lab da Shopee/ML</small>
        <input type="file" id="fileInput" accept=".zpl,.txt,.lab" style="display:none">
        <div id="fileName" class="file-info" style="display: none;"></div>
    </div>

    <button id="convertBtn">🚀 CONVERTER PARA PDF</button>
    
    <div id="progressBar">
        <div id="progressFill" style="width: 0%"></div>
    </div>
    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const fileNameDisplay = document.getElementById('fileName');
    const btn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    // Drag & Drop
    ['dragover', 'dragenter'].forEach(event => {
        uploadArea.addEventListener(event, e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
        });
    });

    uploadArea.addEventListener('drop', e => {
        e.preventDefault();
        fileInput.files = e.dataTransfer.files;
        handleFileSelect(e.dataTransfer.files[0]);
    });

    uploadArea.addEventListener('click', () => fileInput.click());
    
    fileInput.onchange = e => {
        if (e.target.files[0]) handleFileSelect(e.target.files[0]);
    };

    function handleFileSelect(file) {
        fileNameDisplay.innerHTML = `📄 <strong>${file.name}</strong><br>Tamanho: ${(file.size/1024/1024).toFixed(2)} MB`;
        fileNameDisplay.style.display = 'block';
        btn.disabled = false;
    }

    function updateStatus(text, type = '') {
        status.textContent = text;
        status.className = type;
    }

    function updateProgress(current, total) {
        const percent = (current / total * 100).toFixed(1);
        progressFill.style.width = percent + '%';
        status.textContent = `⏳ Processando ${current}/${total} etiquetas (${percent}%)`;
    }

    async function convertSingleLabel(zpl, index, total) {
        const dpmm = document.getElementById('dpmm').value;
        const w = document.getElementById('width').value;
        const h = document.getElementById('height').value;

        const response = await fetch(`https://api.labelary.com/v1/printers/${dpmm}dpmm/labels/${w}x${h}/0/`, {
            method: 'POST',
            headers: {
                'Accept': 'application/pdf',
                'Content-Type': 'application/x-www-form-urlencoded; charset=utf-8'
            },
            body: encodeURIComponent(zpl)  // 🔑 CADA etiqueta ENCODED separadamente
        });

        if (!response.ok) {
            const err = await response.text();
            throw new Error(`Etiqueta ${index + 1}: ${response.status} - ${err}`);
        }

        return await response.blob();
    }

    async function startConversion() {
        if (!fileInput.files[0]) {
            updateStatus("❌ Selecione um arquivo!", "error");
            return;
        }

        btn.disabled = true;
        progressBar.style.display = 'block';
        updateStatus("📖 Lendo arquivo...", "loading");

        try {
            const rawContent = await fileInput.files[0].text();
            const labels = extractZPLLabels(rawContent);

            if (!labels?.length) {
                throw new Error("❌ Nenhuma etiqueta ZPL válida encontrada!\nVerifique se contém ^XA e ^XZ");
            }

            updateStatus(`🚀 ${labels.length} etiquetas encontradas!\n🔄 Convertendo...`, "progress");
            
            // 🔥 CONVERTE CADA ETIQUETA SEPARADAMENTE
            const pdfBlobs = [];
            for (let i = 0; i < labels.length; i++) {
                updateProgress(i + 1, labels.length);
                
                try {
                    const blob = await convertSingleLabel(labels[i], i, labels.length);
                    pdfBlobs.push(blob);
                    await new Promise(r => setTimeout(r, 100)); // Delay para não sobrecarregar API
                } catch (err) {
                    console.warn(`Falha na etiqueta ${i + 1}:`, err.message);
                    // Continua com as outras
                }
            }

            if (pdfBlobs.length === 0) {
                throw new Error("❌ Nenhuma etiqueta foi convertida com sucesso!");
            }

            // 🔥 JUNTA TODOS OS PDFs
            const mergedPdf = await mergePdfs(pdfBlobs);
            
            const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
            const fileName = `etiquetas_${fileInput.files[0].name.replace(/\.[^/.]+$/, "")}_${timestamp}.pdf`;
            
            downloadBlob(mergedPdf, fileName);
            updateStatus(`✅ SUCESSO! ${pdfBlobs.length}/${labels.length} etiquetas convertidas`, "success");

        } catch (err) {
            updateStatus("❌ ERRO: " + err.message, "error");
            console.error(err);
        } finally {
            btn.disabled = false;
            setTimeout(() => progressBar.style.display = 'none', 2000);
        }
    }

    // 🔥 MERGE DE PDFs (usando PDF-lib)
    async function mergePdfs(pdfBlobs) {
        const { PDFDocument } = await import('https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js');
        
        const mergedPdf = await PDFDocument.create();
        
        for (const blob of pdfBlobs) {
            const pdfBytes = await blob.arrayBuffer();
            const donorPdf = await PDFDocument.load(pdfBytes);
            const copiedPages = await mergedPdf.copyPages(donorPdf, donorPdf.getPageIndices());
            copiedPages.forEach(page => mergedPdf.addPage(page));
        }
        
        return await mergedPdf.save();
    }

    function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(new Blob([blob], { type: 'application/pdf' }));
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function extractZPLLabels(content) {
        content = content.replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n');
        
        // Extrai TODAS as etiquetas ^XA^XZ
        let labels = [];
        let match;
        const regex = /\^XA([\s\S]*?)\^XZ/gi;
        
        while ((match = regex.exec(content)) !== null) {
            const cleanLabel = `^XA${match[1]}^XZ\n`.trim();
            if (cleanLabel.length > 20) {
                labels.push(cleanLabel);
            }
        }
        
        // Fallback para arquivo único
        if (labels.length === 0 && (content.includes('^XA') || content.includes('^XZ'))) {
            labels = [content.trim()];
        }
        
        return labels;
    }

    btn.addEventListener('click', startConversion);
</script>

</body>
</html>
