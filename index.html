<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Conversor Shopee/ML - FORMATO SHOPEE</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }
        .container { 
            width: 100%; 
            max-width: 700px; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        }
        h1 { 
            color: #2c3e50; 
            text-align: center; 
            font-size: 2.2rem; 
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .config { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 25px; 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 12px; 
            border: 2px solid #e9ecef;
        }
        .field label { 
            font-size: 13px; 
            font-weight: 600; 
            display: block; 
            margin-bottom: 8px; 
            color: #495057; 
        }
        select, input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e9ecef; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        .upload-area { 
            border: 3px dashed #667eea; 
            padding: 40px; 
            text-align: center; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            cursor: pointer; 
            background: linear-gradient(135deg, #f0f2ff 0%, #e8e8ff 100%); 
            transition: all 0.3s;
        }
        .upload-area:hover { border-color: #764ba2; transform: translateY(-2px); }
        button { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(45deg, #27ae60, #2ecc71); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 18px; 
        }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        #status { 
            margin-top: 25px; 
            padding: 20px; 
            border-radius: 12px; 
            font-size: 16px; 
            text-align: center; 
            min-height: 24px; 
            line-height: 1.6; 
            font-weight: 500;
        }
        .loading { background: #e3f2fd; color: #1976d2; border: 2px solid #2196f3; }
        .success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
        .progress { background: #fff3cd; color: #856404; border: 2px solid #ffc107; }
        #progressBar { 
            width: 100%; 
            height: 25px; 
            background: #e9ecef; 
            border-radius: 12px; 
            overflow: hidden; 
            margin-top: 15px; 
            display: none; 
        }
        #progressFill { 
            height: 100%; 
            background: linear-gradient(90deg, #27ae60, #2ecc71); 
            transition: width 0.3s; 
            position: relative;
        }
        #progressText { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            font-weight: bold; 
            font-size: 12px;
        }
        .file-info { 
            background: #e8f5e8; 
            padding: 12px; 
            border-radius: 8px; 
            margin-top: 10px; 
            font-size: 14px; 
            color: #155724; 
        }
        pre { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 12px; 
            max-height: 150px; 
            overflow-y: auto; 
            margin-top: 15px; 
            white-space: pre-wrap; 
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 Conversor SHOPEE/ML</h1>
    <p class="subtitle">✅ Formato ~DGR da Shopee + Mercado Livre</p>
    
    <div class="config">
        <div class="field">
            <label>📐 DPI</label>
            <select id="dpmm">
                <option value="8" selected>203 dpi</option>
                <option value="12">300 dpi</option>
            </select>
        </div>
        <div class="field">
            <label>📏 Largura</label>
            <input type="number" id="width" value="4" min="2" max="8" step="0.1">
        </div>
        <div class="field">
            <label>📐 Altura</label>
            <input type="number" id="height" value="6" min="2" max="12" step="0.1">
        </div>
    </div>

    <div class="upload-area" id="uploadArea">
        <strong>📁 ARRASTE ou CLIQUE seu arquivo</strong><br>
        <small>✅ .zpl, .txt, .lab da Shopee/ML</small>
        <input type="file" id="fileInput" accept=".zpl,.txt,.lab" style="display:none">
        <div id="fileName" class="file-info" style="display: none;"></div>
        <pre id="preview"></pre>
    </div>

    <button id="convertBtn">🚀 CONVERTER PARA PDF</button>
    
    <div id="progressBar">
        <div id="progressFill">
            <div id="progressText">0%</div>
        </div>
    </div>
    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const fileNameDisplay = document.getElementById('fileName');
    const preview = document.getElementById('preview');
    const btn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    // Drag & Drop
    uploadArea.addEventListener('dragover', e => {
        e.preventDefault();
        uploadArea.style.borderColor = '#764ba2';
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.style.borderColor = '#667eea';
    });
    uploadArea.addEventListener('drop', e => {
        e.preventDefault();
        uploadArea.style.borderColor = '#667eea';
        if (e.dataTransfer.files[0]) {
            fileInput.files = e.dataTransfer.files;
            handleFileSelect(e.dataTransfer.files[0]);
        }
    });
    uploadArea.addEventListener('click', () => fileInput.click());

    fileInput.onchange = e => {
        if (e.target.files[0]) handleFileSelect(e.target.files[0]);
    };

    function handleFileSelect(file) {
        fileNameDisplay.innerHTML = `📄 <strong>${file.name}</strong><br>📊 ${(file.size/1024).toFixed(0)} KB`;
        fileNameDisplay.style.display = 'block';
        btn.disabled = false;

        // Preview
        const reader = new FileReader();
        reader.onload = e => {
            const content = e.target.result;
            const labels = extractShopeeLabels(content);
            preview.textContent = `✅ Encontradas ${labels.length} etiquetas\n\n${labels[0]?.substring(0, 500)}...`;
            preview.style.display = 'block';
        };
        reader.readAsText(file);
    }

    function updateStatus(text, type = '') {
        status.textContent = text;
        status.className = type;
    }

    function updateProgress(current, total) {
        const percent = Math.round((current / total) * 100);
        progressFill.style.width = percent + '%';
        progressText.textContent = `${percent}% (${current}/${total})`;
    }

    // 🔥 EXTRAÇÃO ESPECÍFICA PARA FORMATO SHOPEE
    function extractShopeeLabels(content) {
        // Remove BOM e normaliza
        content = content.replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n');
        
        const labels = [];
        
        // Padrão SHOPEE: ~DGR:...^XA...^XZ
        const shopeePattern = /~DGR:.*?^XA([\s\S]*?)\^XZ/gi;
        let match;
        
        while ((match = shopeePattern.exec(content)) !== null) {
            const labelContent = `^XA${match[1]}^XZ`;
            labels.push(labelContent.trim());
        }
        
        // Fallback padrão ZPL
        if (labels.length === 0) {
            const standardPattern = /\^XA([\s\S]*?)\^XZ/gi;
            while ((match = standardPattern.exec(content)) !== null) {
                const labelContent = `^XA${match[1]}^XZ`;
                labels.push(labelContent.trim());
            }
        }
        
        // Fallback arquivo único
        if (labels.length === 0 && content.includes('^XA')) {
            labels.push(content.trim());
        }
        
        return labels.filter(l => l.length > 50);
    }

    async function convertLabel(zpl, index, total) {
        const dpmm = document.getElementById('dpmm').value;
        const w = document.getElementById('width').value;
        const h = document.getElementById('height').value;

        const response = await fetch(`https://api.labelary.com/v1/printers/${dpmm}dpmm/labels/${w}x${h}/0/`, {
            method: 'POST',
            headers: {
                'Accept': 'application/pdf',
                'Content-Type': 'application/x-www-form-urlencoded; charset=utf-8'
            },
            body: encodeURIComponent(zpl)
        });

        if (!response.ok) {
            throw new Error(`${response.status}: ${await response.text()}`);
        }

        return await response.blob();
    }

    async function mergePdfs(blobs) {
        const { PDFDocument } = await import('https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js');
        const mergedPdf = await PDFDocument.create();
        
        for (const blob of blobs) {
            const pdfBytes = await blob.arrayBuffer();
            const donor = await PDFDocument.load(pdfBytes);
            const pages = await mergedPdf.copyPages(donor, donor.getPageIndices());
            pages.forEach(page => mergedPdf.addPage(page));
        }
        
        return await mergedPdf.save();
    }

    async function startConversion() {
        if (!fileInput.files[0]) {
            updateStatus("❌ Selecione um arquivo!", "error");
            return;
        }

        btn.disabled = true;
        progressBar.style.display = 'block';
        updateStatus("📖 Analisando arquivo Shopee...", "loading");

        try {
            const content = await fileInput.files[0].text();
            const labels = extractShopeeLabels(content);

            if (labels.length === 0) {
                throw new Error("❌ Nenhuma etiqueta válida encontrada!\nFormato esperado: ~DGR...^XA...^XZ");
            }

            updateStatus(`✅ ${labels.length} etiquetas Shopee encontradas!\n🚀 Iniciando conversão...`, "progress");
            
            const pdfBlobs = [];
            
            // Converte cada etiqueta individualmente
            for (let i = 0; i < labels.length; i++) {
                updateProgress(i + 1, labels.length);
                
                try {
                    const blob = await convertLabel(labels[i], i, labels.length);
                    pdfBlobs.push(blob);
                    // Pequeno delay para não sobrecarregar
                    await new Promise(r => setTimeout(r, 200));
                } catch (err) {
                    console.warn(`Etiqueta ${i+1} falhou:`, err.message);
                }
            }

            if (pdfBlobs.length === 0) {
                throw new Error("❌ Nenhuma etiqueta convertida!");
            }

            // Junta todos os PDFs
            updateStatus("🔗 Juntando PDFs...", "loading");
            const mergedPdf = await mergePdfs(pdfBlobs);
            
            // Download
            const timestamp = new Date().toISOString().slice(0,19).replace(/:/g,'-');
            const filename = `shopee_etiquetas_${timestamp}.pdf`;
            
            const url = URL.createObjectURL(new Blob([mergedPdf], {type: 'application/pdf'}));
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            updateStatus(`✅ PRONTO! ${pdfBlobs.length}/${labels.length} etiquetas salvas em PDF`, "success");

        } catch (error) {
            updateStatus(`❌ ERRO: ${error.message}`, "error");
            console.error(error);
        } finally {
            btn.disabled = false;
            setTimeout(() => {
                progressBar.style.display = 'none';
                progressFill.style.width = '0%';
            }, 3000);
        }
    }

    btn.addEventListener('click', startConversion);
</script>

</body>
</html>
