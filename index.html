<!DOCTYPE html>
<html>
<head>
    <title>ZPL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/zpl-to-image@1.0.4/dist/zpl-to-image.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: monospace; 
            background: #1a1a1a; 
            color: #ccc; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .box { 
            max-width: 500px; 
            margin: 0 auto; 
            background: #2a2a2a; 
            border: 1px solid #444; 
            border-radius: 5px; 
            padding: 20px; 
        }
        h1 { 
            color: #fff; 
            text-align: center; 
            margin-bottom: 20px; 
            font-size: 20px; 
        }
        input[type=file] { 
            width: 100%; 
            padding: 10px; 
            background: #333; 
            color: #ccc; 
            border: 1px solid #555; 
            border-radius: 3px; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #0066cc; 
            color: white; 
            border: none; 
            border-radius: 3px; 
            font-size: 14px; 
            cursor: pointer; 
            margin: 10px 0; 
        }
        button:disabled { 
            background: #444; 
            cursor: not-allowed; 
        }
        #status { 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 3px; 
            font-size: 13px; 
            text-align: center; 
        }
        .ok { background: #0a3d0a; color: #90ee90; }
        .load { background: #003366; color: #add8e6; }
        .err { background: #4d0000; color: #ff6b6b; }
        #info { 
            background: #333; 
            padding: 8px; 
            border-radius: 3px; 
            font-size: 12px; 
            margin: 10px 0; 
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>ZPL → PDF</h1>
        
        <input type="file" id="file" accept=".zpl,.txt,.lab">
        <div id="info"></div>
        
        <button id="btn" disabled>CONVERTER</button>
        <div id="status"></div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        const file = document.getElementById('file');
        const btn = document.getElementById('btn');
        const info = document.getElementById('info');
        const status = document.getElementById('status');

        file.onchange = async e => {
            const f = e.target.files[0];
            if (!f) return;
            
            info.innerHTML = `${f.name} (${Math.round(f.size/1024)}KB)`;
            btn.disabled = false;
            
            const text = await f.text();
            const labels = parseZPL(text);
            info.innerHTML += `<br>✅ ${labels.length} etiquetas`;
        };

        function parseZPL(text) {
            const labels = [];
            let match;
            
            // Shopee/ML
            const regex1 = /~DGR:.*?(\^XA[\s\S]*?\^XZ)/gi;
            while ((match = regex1.exec(text)) !== null) {
                labels.push(match[1]);
            }
            
            // Padrão
            if (labels.length === 0) {
                const regex2 = /(\^XA[\s\S]*?\^XZ)/gi;
                while ((match = regex2.exec(text)) !== null) {
                    labels.push(match[1]);
                }
            }
            
            return labels;
        }

        btn.onclick = async () => {
            if (!file.files[0]) return;
            
            btn.disabled = true;
            status.innerHTML = 'CONVERTENDO...';
            status.className = 'load';

            try {
                const text = await file.files[0].text();
                const labels = parseZPL(text);
                
                const pdf = new jsPDF('p', 'mm', 'a4');
                let y = 10;
                
                for (let i = 0; i < labels.length; i++) {
                    if (y > 250) {
                        pdf.addPage();
                        y = 10;
                    }
                    
                    const img = await zplToImage(labels[i], { width: 800 });
                    pdf.addImage(img, 'PNG', 10, y, 190, 0);
                    y += 130;
                }
                
                pdf.save(`zpl_${Date.now()}.pdf`);
                status.innerHTML = `${labels.length} PDFs OK`;
                status.className = 'ok';
                
            } catch (e) {
                status.innerHTML = `ERRO: ${e.message}`;
                status.className = 'err';
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
