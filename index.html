<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Shopee/ML - Sem Erros</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; font-size: 1.5rem; }
        .config { display: flex; gap: 10px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .field { flex: 1; }
        label { font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; color: #7f8c8d; }
        select, input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .upload-area { border: 2px dashed #3498db; padding: 30px; text-align: center; border-radius: 8px; margin-bottom: 20px; cursor: pointer; background: #ebf5fb; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #bdc3c7; }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; font-size: 14px; text-align: center; min-height: 20px; line-height: 1.6; }
        .loading { background: #e8f4fd; color: #2980b9; border: 1px solid #3498db; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>Conversor Shopee & Mercado Livre</h1>
    
    <div class="config">
        <div class="field">
            <label>DPI</label>
            <select id="dpmm">
                <option value="8">203 dpi</option>
                <option value="12">300 dpi</option>
            </select>
        </div>
        <div class="field">
            <label>Largura (Pol)</label>
            <input type="number" id="width" value="4">
        </div>
        <div class="field">
            <label>Altura (Pol)</label>
            <input type="number" id="height" value="6">
        </div>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <strong>CLIQUE AQUI PARA SUBIR O ARQUIVO</strong><br>
        <small>(Formatos .txt ou .zpl da Shopee/ML)</small>
        <input type="file" id="fileInput" accept=".zpl,.txt" style="display:none">
        <div id="fileName" style="margin-top:10px; color: #2980b9; font-weight: bold;"></div>
    </div>

    <button id="convertBtn">CONVERTER E BAIXAR PDF</button>
    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');
    const btn = document.getElementById('convertBtn');
    const status = document.getElementById('status');

    fileInput.onchange = () => {
        if(fileInput.files[0]) fileNameDisplay.innerText = "Arquivo: " + fileInput.files[0].name;
    };

    function updateStatus(text, type) {
        status.innerText = text;
        status.className = type ? type : '';
    }

    async function startConversion() {
        if (!fileInput.files[0]) {
            updateStatus("❌ Por favor, selecione um arquivo primeiro.", "error");
            return;
        }

        btn.disabled = true;
        updateStatus("⏳ Lendo arquivo...", "loading");

        try {
            const rawContent = await fileInput.files[0].text();
            
            // LIMPEZA RADICAL: Pega apenas o que está entre ^XA e ^XZ
            const labelRegex = /\^XA[\s\S]*?\^XZ/gi;
            const labels = rawContent.match(labelRegex);

            if (!labels || labels.length === 0) {
                throw new Error("Não detectamos etiquetas Zebra válidas no arquivo.");
            }

            const dpmm = document.getElementById('dpmm').value;
            const w = document.getElementById('width').value;
            const h = document.getElementById('height').value;

            updateStatus(`🚀 Detectadas ${labels.length} etiquetas.\nGerando PDF...`, "loading");

            // Processamos todas as etiquetas juntas para um único PDF, 
            // mas limpamos cada uma para evitar o erro 415.
            const cleanZpl = labels.join('\n');

            const response = await fetch(`https://api.labelary.com/v1/printers/${dpmm}dpmm/labels/${w}x${h}/0/`, {
                method: 'POST',
                headers: {
                    'Accept': 'application/pdf',
                    'Content-Type': 'application/x-www-form-urlencoded' // Formato mais estável
                },
                body: cleanZpl
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error("A API rejeitou o arquivo: " + errText);
            }

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Etiquetas_${new Date().getTime()}.pdf`;
            a.click();

            updateStatus(`✅ Sucesso! ${labels.length} etiquetas convertidas.`, "success");

        } catch (err) {
            updateStatus("❌ Erro: " + err.message, "error");
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    }

    btn.addEventListener('click', startConversion);
</script>

</body>
</html>
