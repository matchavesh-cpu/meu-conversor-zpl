<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 ZPL to PDF - FUNCIONA OFFLINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/zpl-to-image@1.0.4/dist/zpl-to-image.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            max-width: 600px; 
            width: 100%; 
        }
        h1 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 10px; 
        }
        .upload-area { 
            border: 3px dashed #4CAF50; 
            border-radius: 10px; 
            padding: 40px; 
            text-align: center; 
            cursor: pointer; 
            margin: 20px 0; 
            transition: all 0.3s; 
        }
        .upload-area:hover { 
            background: #e8f5e8; 
            border-color: #45a049; 
        }
        button { 
            background: #4CAF50; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            width: 100%; 
            margin: 10px 0; 
        }
        button:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }
        #status { 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            margin: 15px 0; 
            min-height: 20px; 
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .loading { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #fileInfo { 
            background: #e3f2fd; 
            padding: 10px; 
            border-radius: 5px; 
            margin: 10px 0; 
            font-size: 14px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 ZPL → PDF OFFLINE</h1>
        <p style="text-align: center; color: #666;">Shopee/ML - Sem limites - Funciona offline</p>
        
        <div class="upload-area" id="uploadArea">
            <strong>📁 Clique ou arraste seu arquivo ZPL</strong><br>
            <small style="color: #666;">.zpl .txt .lab</small>
            <input type="file" id="fileInput" accept=".zpl,.txt" style="display: none;">
        </div>
        
        <div id="fileInfo"></div>
        
        <button id="convertBtn" disabled>🚀 Converter para PDF</button>
        <div id="status"></div>
        <canvas id="canvas" style="display: none;"></canvas>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const fileInfo = document.getElementById('fileInfo');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas');

        // Drag & Drop
        uploadArea.ondragover = e => e.preventDefault();
        uploadArea.ondrop = e => {
            e.preventDefault();
            fileInput.files = e.dataTransfer.files;
            handleFile(e.dataTransfer.files[0]);
        };
        uploadArea.onclick = () => fileInput.click();
        
        fileInput.onchange = e => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if (!file) return;
            
            fileInfo.innerHTML = `📄 <strong>${file.name}</strong> (${(file.size/1024).toFixed(1)} KB)`;
            convertBtn.disabled = false;
            
            const text = await file.text();
            const labels = parseZPL(text);
            
            status.innerHTML = `✅ Encontradas <strong>${labels.length}</strong> etiquetas!`;
            status.className = 'success';
        }

        function parseZPL(text) {
            // Extrai todas ^XA ... ^XZ
            const labels = [];
            const regex = /\^XA([\s\S]*?)\^XZ/gi;
            let match;
            
            while ((match = regex.exec(text)) !== null) {
                labels.push(`^XA${match[1]}^XZ`);
            }
            
            // Shopee fallback
            if (labels.length === 0) {
                const shopeeRegex = /~DGR:.*?(\^XA[\s\S]*?\^XZ)/gi;
                while ((match = shopeeRegex.exec(text)) !== null) {
                    labels.push(match[1]);
                }
            }
            
            return labels;
        }

        convertBtn.onclick = async () => {
            if (!fileInput.files[0]) return;
            
            convertBtn.disabled = true;
            status.innerHTML = '⏳ Convertendo...';
            status.className = 'loading';

            try {
                const text = await fileInput.files[0].text();
                const labels = parseZPL(text);
                
                const pdf = new jsPDF('p', 'mm', 'a4');
                let yPos = 10;
                
                for (let i = 0; i < labels.length; i++) {
                    // Converte ZPL para imagem
                    const imgData = await zplToImage(labels[i], {
                        width: 800,
                        height: 1200
                    });
                    
                    // Adiciona ao PDF
                    if (yPos > 250) {
                        pdf.addPage();
                        yPos = 10;
                    }
                    
                    pdf.addImage(imgData, 'PNG', 10, yPos, 190, 0);
                    yPos += 130;
                }
                
                // Download
                pdf.save(`etiquetas_${Date.now()}.pdf`);
                
                status.innerHTML = `✅ ${labels.length} etiquetas convertidas!`;
                status.className = 'success';
                
            } catch (error) {
                status.innerHTML = `❌ Erro: ${error.message}`;
                status.className = 'error';
                console.error(error);
            } finally {
                convertBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
